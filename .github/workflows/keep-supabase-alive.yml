name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */5 * *'  # Cada 5 días al mediodía
  workflow_dispatch:          # Para correrlo manualmente si querés

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/productos?limit=1"
          echo "Ping exitoso"
