<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luzbell — Panel Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }

        /* LOGIN */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fce8f0, #f5d0e0);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .login-box h1 { color: #D4537E; margin-bottom: 8px; font-size: 28px; }
        .login-box p { color: #888; margin-bottom: 28px; font-size: 14px; }
        .login-box input {
            width: 100%; padding: 12px 16px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 15px; margin-bottom: 14px;
        }
        .login-box input:focus { outline: none; border-color: #D4537E; }
        .login-error { color: #e53e3e; font-size: 13px; margin-bottom: 12px; display: none; }

        /* PANEL */
        .panel { display: none; min-height: 100vh; }
        .panel-header {
            background: white;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: sticky; top: 0; z-index: 100;
        }
        .panel-header h1 { color: #D4537E; font-size: 20px; }
        .panel-body { padding: 28px; max-width: 960px; margin: 0 auto; }

        /* TABS */
        .tabs { display: flex; gap: 8px; margin-bottom: 28px; }
        .tab {
            padding: 10px 22px; border-radius: 8px; border: none;
            cursor: pointer; font-size: 14px; font-weight: bold;
            background: white; color: #666; transition: all 0.2s;
        }
        .tab.activo { background: #D4537E; color: white; }
        .tab:hover:not(.activo) { border-color: #D4537E; color: #D4537E; }

        /* SECCION */
        .seccion { display: none; }
        .seccion.activa { display: block; }

        /* FORMULARIO */
        .form-card {
            background: white; border-radius: 12px; padding: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 28px;
        }
        .form-card h2 { margin-bottom: 20px; font-size: 17px; color: #333; }
        .form-grupo { margin-bottom: 16px; }
        .form-grupo label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #555; }
        .form-grupo input, .form-grupo select {
            width: 100%; padding: 10px 14px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px;
        }
        .form-grupo input:focus, .form-grupo select:focus { outline: none; border-color: #D4537E; }
        .form-fila { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* PREVIEW IMAGEN */
        .preview-imagen {
            width: 100%; height: 180px; border-radius: 8px;
            object-fit: cover; display: none; margin-top: 10px;
            border: 1px solid #eee;
        }
        .upload-area {
            border: 2px dashed #ddd; border-radius: 8px; padding: 24px;
            text-align: center; cursor: pointer; transition: border-color 0.2s;
            color: #aaa; font-size: 14px;
        }
        .upload-area:hover { border-color: #D4537E; color: #D4537E; }
        .upload-area input { display: none; }

        /* BOTONES */
        .btn-rosa {
            background: #D4537E; color: white; border: none;
            padding: 12px 28px; border-radius: 8px; cursor: pointer;
            font-size: 14px; font-weight: bold; transition: background 0.2s;
        }
        .btn-rosa:hover { background: #993556; }
        .btn-rosa:disabled { background: #e8a0b8; cursor: not-allowed; }
        .btn-peligro {
            background: white; color: #e53e3e; border: 1px solid #e53e3e;
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        .btn-peligro:hover { background: #e53e3e; color: white; }
        .btn-logout {
            background: transparent; border: 1px solid #ddd; color: #666;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
        }

        /* MENSAJE ESTADO */
        .mensaje-estado {
            padding: 12px 16px; border-radius: 8px; font-size: 14px;
            margin-bottom: 16px; display: none;
        }
        .mensaje-ok { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
        .mensaje-error { background: #fff5f5; color: #c53030; border: 1px solid #fc8181; }

        /* TOAST ADMIN */
        .toast-admin {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
            z-index: 9999;
            pointer-events: none;
        }
        .toast-admin .toast {
            background: rgba(20, 20, 20, 0.95);
            color: white;
            padding: 12px 16px;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
            max-width: 320px;
            font-size: 14px;
            line-height: 1.4;
            pointer-events: auto;
            opacity: 0;
            transform: translateY(-10px) scale(0.97);
            animation: toastIn 0.2s ease forwards;
        }
        .toast-admin .toast.toast-out {
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* LISTA PRODUCTOS */
        .lista-productos { display: grid; gap: 14px; }
        .item-producto {
            background: white; border-radius: 10px; padding: 16px;
            display: flex; align-items: center; gap: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .item-producto img {
            width: 64px; height: 64px; object-fit: cover;
            border-radius: 8px; background: #fce8f0; flex-shrink: 0;
        }
        .item-producto-emoji {
            width: 64px; height: 64px; border-radius: 8px;
            background: #fce8f0; display: flex; align-items: center;
            justify-content: center; font-size: 28px; flex-shrink: 0;
        }
        .item-producto-info { flex: 1; }
        .item-producto-info p { font-weight: bold; margin-bottom: 4px; }
        .item-producto-info span { font-size: 12px; color: #888; }
        .item-precio { color: #D4537E; font-weight: bold; font-size: 15px; }

        .vacio { text-align: center; color: #aaa; padding: 48px; }

        .talles-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }
        .talle-check {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .talle-check:has(input:checked) {
            background: #fce8f0;
            border-color: #D4537E;
            color: #D4537E;
        }
        .talle-check input { display: none; }
        .disponible-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #555;
        }
        .disponible-label input { width: 18px; height: 18px; accent-color: #D4537E; cursor: pointer; }
        .badge-disponible {
            font-size: 11px; padding: 3px 10px; border-radius: 20px;
            font-weight: bold;
        }
        .badge-si { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
        .badge-no { background: #fff5f5; color: #c53030; border: 1px solid #fc8181; }

        @media (max-width: 600px) {
            .form-fila { grid-template-columns: 1fr; }
            .panel-body { padding: 16px; }
        }
    </style>
</head>
<body>

<div id="toastAdmin" class="toast-admin"></div>

<!-- PANTALLA DE LOGIN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>Luzbell</h1>
        <p>Panel de administración</p>
        <input type="password" id="inputPassword" placeholder="Contraseña" onkeydown="if(event.key==='Enter') iniciarSesion()">
        <p class="login-error" id="loginError">Contraseña incorrecta</p>
        <button class="btn-rosa" style="width:100%" onclick="iniciarSesion()">Entrar</button>
    </div>
</div>

<!-- PANEL PRINCIPAL -->
<div class="panel" id="panelAdmin">
    <div class="panel-header">
        <h1>🛍️ Luzbell — Admin</h1>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
    </div>
    <div class="panel-body">

        <div class="tabs">
            <button class="tab activo" onclick="cambiarTab('productos')">Productos</button>
            <button class="tab" onclick="cambiarTab('slider')">Slider de fotos</button>
        </div>

        <!-- TAB PRODUCTOS -->
        <div class="seccion activa" id="secProductos">
            <div class="form-card">
                <h2>➕ Agregar producto</h2>
                <div id="msgProducto" class="mensaje-estado"></div>
                <div class="form-fila">
                    <div class="form-grupo">
                        <label>Nombre del producto</label>
                        <input type="text" id="prodNombre" placeholder="Ej: Vestido floral rosa">
                    </div>
                    <div class="form-grupo">
                        <label>Precio ($)</label>
                        <input type="number" id="prodPrecio" placeholder="Ej: 12000">
                    </div>
                </div>
                <div class="form-grupo">
                    <label>Categoría</label>
                    <select id="prodCategoria">
                        <option value="Vestidos">Vestidos</option>
                        <option value="Remeras">Remeras</option>
                        <option value="Pantalones">Pantalones</option>
                        <option value="Accesorios">Accesorios</option>
                    </select>
                </div>
                <div class="form-grupo">
                    <label>Talles disponibles</label>
                    <div class="talles-checkboxes">
                        <label class="talle-check"><input type="checkbox" value="XS"> XS</label>
                        <label class="talle-check"><input type="checkbox" value="S"> S</label>
                        <label class="talle-check"><input type="checkbox" value="M" checked> M</label>
                        <label class="talle-check"><input type="checkbox" value="L"> L</label>
                        <label class="talle-check"><input type="checkbox" value="XL"> XL</label>
                        <label class="talle-check"><input type="checkbox" value="XXL"> XXL</label>
                        <label class="talle-check"><input type="checkbox" value="Único"> Único</label>
                    </div>
                </div>
                <div class="form-grupo">
                    <label class="disponible-label">
                        <input type="checkbox" id="prodDisponible" checked>
                        Disponible para la venta
                    </label>
                </div>
                <div class="form-grupo">
                    <label>Foto del producto</label>
                    <div class="upload-area" onclick="document.getElementById('prodFoto').click()">
                        📷 Hacé click para subir una foto
                        <input type="file" id="prodFoto" accept="image/*" onchange="previsualizarFoto(this, 'prevProducto')">
                    </div>
                    <img id="prevProducto" class="preview-imagen">
                </div>
                <button class="btn-rosa" id="btnAgregarProducto" onclick="agregarProducto()">Publicar producto</button>
            </div>

            <div class="form-card">
                <h2>📦 Productos publicados</h2>
                <div id="listaProductos" class="lista-productos">
                    <div class="vacio">Cargando...</div>
                </div>
            </div>
        </div>

        <!-- TAB SLIDER -->
        <div class="seccion" id="secSlider">
            <div class="form-card">
                <h2>➕ Agregar foto al slider</h2>
                <div id="msgSlider" class="mensaje-estado"></div>
                <div class="form-grupo">
                    <label>Foto</label>
                    <div class="upload-area" onclick="document.getElementById('sliderFoto').click()">
                        📷 Hacé click para subir una foto
                        <input type="file" id="sliderFoto" accept="image/*" onchange="previsualizarFoto(this, 'prevSlider')">
                    </div>
                    <img id="prevSlider" class="preview-imagen">
                </div>
                <div class="form-grupo">
                    <label>Texto (opcional)</label>
                    <input type="text" id="sliderCaption" placeholder="Ej: Nueva colección Otoño">
                </div>
                <button class="btn-rosa" id="btnAgregarSlider" onclick="agregarSlider()">Agregar al slider</button>
            </div>

            <div class="form-card">
                <h2>🖼️ Fotos del slider</h2>
                <div id="listaSlider" class="lista-productos">
                    <div class="vacio">Cargando...</div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
const SUPABASE_URL = 'https://yudkvusmetwkfrmovisa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1ZGt2dXNtZXR3a2ZybW92aXNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjQzMzUsImV4cCI6MjA5MTcwMDMzNX0.j6QyRSBng5z6tUBzAqodfYCbuz-u-lLbHheYi0FHJ9k';
const PASSWORD = 'luzbell2025';

// ─── LOGIN ───
function iniciarSesion() {
    const pass = document.getElementById('inputPassword').value;
    if (pass === PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('panelAdmin').style.display = 'block';
        cargarProductos();
        cargarSlider();
        mostrarPopupAdmin('Gracias luca crack', 3000);
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
}

function cerrarSesion() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('panelAdmin').style.display = 'none';
    document.getElementById('inputPassword').value = '';
}

// ─── TABS ───
function cambiarTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('activo', (i === 0 && tab === 'productos') || (i === 1 && tab === 'slider'));
    });
    document.getElementById('secProductos').classList.toggle('activa', tab === 'productos');
    document.getElementById('secSlider').classList.toggle('activa', tab === 'slider');
}

// ─── HELPERS ───
async function supabaseFetch(endpoint, options = {}) {
    const res = await fetch(SUPABASE_URL + endpoint, {
        ...options,
        headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            ...(options.headers || {})
        }
    });
    if (res.status === 204 || res.status === 201) return null;
    const text = await res.text();
    if (!text) return null;
    try { return JSON.parse(text); } catch { return null; }
}

async function subirImagen(bucket, archivo) {
    const ext = archivo.name.split('.').pop();
    const nombre = Date.now() + '.' + ext;
    const res = await fetch(SUPABASE_URL + '/storage/v1/object/' + bucket + '/' + nombre, {
        method: 'POST',
        headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': archivo.type,
            'x-upsert': 'true'
        },
        body: archivo
    });
    if (!res.ok) {
        const errBody = await res.text();
        console.error('Storage error:', res.status, errBody);
        throw new Error('Error al subir imagen: ' + res.status + ' ' + errBody);
    }
    return SUPABASE_URL + '/storage/v1/object/public/' + bucket + '/' + nombre;
}

function previsualizarFoto(input, previewId) {
    const prev = document.getElementById(previewId);
    if (input.files && input.files[0]) {
        prev.src = URL.createObjectURL(input.files[0]);
        prev.style.display = 'block';
    }
}

function mostrarMensaje(id, texto, tipo) {
    const el = document.getElementById(id);
    el.textContent = texto;
    el.className = 'mensaje-estado ' + (tipo === 'ok' ? 'mensaje-ok' : 'mensaje-error');
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function mostrarPopupAdmin(texto, duracion = 3000) {
    const cont = document.getElementById('toastAdmin');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = texto;
    cont.appendChild(toast);

    setTimeout(() => {
        toast.classList.add('toast-out');
    }, duracion - 200);

    setTimeout(() => {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, duracion);
}

// ─── PRODUCTOS ───
async function agregarProducto() {
    const nombre = document.getElementById('prodNombre').value.trim();
    const precio = document.getElementById('prodPrecio').value.trim();
    const categoria = document.getElementById('prodCategoria').value;
    const fotoInput = document.getElementById('prodFoto');
    const btnAgregar = document.getElementById('btnAgregarProducto');
    const disponible = document.getElementById('prodDisponible').checked;
    const tallesSeleccionados = [...document.querySelectorAll('.talle-check input:checked')]
        .map(cb => cb.value).join(',');

    if (!nombre || !precio) {
        mostrarMensaje('msgProducto', 'Completá el nombre y el precio.', 'error');
        return;
    }

    btnAgregar.disabled = true;
    btnAgregar.textContent = 'Publicando...';

    try {
        let imagen_url = null;
        if (fotoInput.files[0]) {
            imagen_url = await subirImagen('productos', fotoInput.files[0]);
        }

        await supabaseFetch('/rest/v1/productos', {
            method: 'POST',
            headers: { 'Prefer': 'return=minimal' },
            body: JSON.stringify({ nombre, precio: parseInt(precio), categoria, imagen_url, talles: tallesSeleccionados, disponible })
        });

        mostrarMensaje('msgProducto', '✅ Producto publicado!', 'ok');
        document.getElementById('prodNombre').value = '';
        document.getElementById('prodPrecio').value = '';
        document.getElementById('prodFoto').value = '';
        document.getElementById('prevProducto').style.display = 'none';
        document.getElementById('prodDisponible').checked = true;
        document.querySelectorAll('.talle-check input').forEach(cb => cb.checked = cb.value === 'M');
        cargarProductos();
    } catch (e) {
        console.error('Error producto:', e);
        mostrarMensaje('msgProducto', 'Error: ' + e.message, 'error');
    }

    btnAgregar.disabled = false;
    btnAgregar.textContent = 'Publicar producto';
}

async function cargarProductos() {
    const lista = document.getElementById('listaProductos');
    const data = await supabaseFetch('/rest/v1/productos?select=*&order=created_at.desc');
    if (!data || data.length === 0) {
        lista.innerHTML = '<div class="vacio">No hay productos todavía.</div>';
        return;
    }
    lista.innerHTML = data.map(p => `
        <div class="item-producto">
            ${p.imagen_url
                ? `<img src="${p.imagen_url}" alt="${p.nombre}">`
                : `<div class="item-producto-emoji">👗</div>`}
            <div class="item-producto-info">
                <p>${p.nombre}</p>
                <span>${p.categoria}${p.talles ? ' · ' + p.talles : ''}</span>
                <span class="badge-disponible ${p.disponible ? 'badge-si' : 'badge-no'}" style="display:inline-block;margin-top:4px">
                    ${p.disponible ? '✅ Disponible' : '❌ Agotado'}
                </span>
            </div>
            <span class="item-precio">$${Number(p.precio).toLocaleString('es-AR')}</span>
            <div style="display:flex;flex-direction:column;gap:6px">
                <button class="btn-peligro" style="background:${p.disponible ? '#fff' : '#D4537E'};color:${p.disponible ? '#D4537E' : '#fff'};border-color:#D4537E" onclick="toggleDisponible(${p.id}, ${p.disponible})">${p.disponible ? 'Marcar agotado' : 'Marcar disponible'}</button>
                <button class="btn-peligro" onclick="eliminarProducto(${p.id})">Eliminar</button>
            </div>
        </div>
    `).join('');
}

async function toggleDisponible(id, estadoActual) {
    await supabaseFetch('/rest/v1/productos?id=eq.' + id, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=minimal' },
        body: JSON.stringify({ disponible: !estadoActual })
    });
    cargarProductos();
}

async function eliminarProducto(id) {
    if (!confirm('¿Eliminar este producto?')) return;
    await supabaseFetch('/rest/v1/productos?id=eq.' + id, { method: 'DELETE' });
    cargarProductos();
}

// ─── SLIDER ───
async function agregarSlider() {
    const fotoInput = document.getElementById('sliderFoto');
    const caption = document.getElementById('sliderCaption').value.trim();
    const btnAgregar = document.getElementById('btnAgregarSlider');

    if (!fotoInput.files[0]) {
        mostrarMensaje('msgSlider', 'Seleccioná una foto primero.', 'error');
        return;
    }

    btnAgregar.disabled = true;
    btnAgregar.textContent = 'Subiendo...';

    try {
        const imagen_url = await subirImagen('slider', fotoInput.files[0]);
        const data = await supabaseFetch('/rest/v1/slider?select=orden&order=orden.desc&limit=1');
        const orden = (data && data.length > 0 ? data[0].orden : 0) + 1;

        await supabaseFetch('/rest/v1/slider', {
            method: 'POST',
            headers: { 'Prefer': 'return=minimal' },
            body: JSON.stringify({ imagen_url, caption, orden })
        });

        mostrarMensaje('msgSlider', '✅ Foto agregada al slider!', 'ok');
        document.getElementById('sliderFoto').value = '';
        document.getElementById('sliderCaption').value = '';
        document.getElementById('prevSlider').style.display = 'none';
        cargarSlider();
    } catch (e) {
        console.error('Error slider:', e);
        mostrarMensaje('msgSlider', 'Error: ' + e.message, 'error');
    }

    btnAgregar.disabled = false;
    btnAgregar.textContent = 'Agregar al slider';
}

async function cargarSlider() {
    const lista = document.getElementById('listaSlider');
    const data = await supabaseFetch('/rest/v1/slider?select=*&order=orden.asc');
    if (!data || data.length === 0) {
        lista.innerHTML = '<div class="vacio">No hay fotos todavía.</div>';
        return;
    }
    lista.innerHTML = data.map(s => `
        <div class="item-producto">
            <img src="${s.imagen_url}" alt="slide">
            <div class="item-producto-info">
                <p>${s.caption || '(sin texto)'}</p>
                <span>Posición ${s.orden}</span>
            </div>
            <button class="btn-peligro" onclick="eliminarSlide(${s.id})">Eliminar</button>
        </div>
    `).join('');
}

async function eliminarSlide(id) {
    if (!confirm('¿Eliminar esta foto del slider?')) return;
    await supabaseFetch('/rest/v1/slider?id=eq.' + id, { method: 'DELETE' });
    cargarSlider();
}
</script>
